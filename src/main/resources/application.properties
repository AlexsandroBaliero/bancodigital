spring.application.name=bancodigital
# Conexao com o PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bancodigital}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate so CONFERE o schema, nunca altera (quem manda nas tabelas e o Flyway)
spring.jpa.hibernate.ddl-auto=validate

# Mostra o SQL que o Hibernate gera (otimo pra aprender)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
