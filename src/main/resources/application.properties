spring.application.name=bancodigital
# Conex„o com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bancodigital
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate sÛ CONFERE o schema, nunca altera (quem manda nas tabelas È o Flyway)
spring.jpa.hibernate.ddl-auto=validate

# Mostra o SQL que o Hibernate gera (Ûtimo pra aprender)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
