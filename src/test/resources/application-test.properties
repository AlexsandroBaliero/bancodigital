# Perfil de TESTE - banco H2 em memoria, nasce e morre com o teste
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# O Hibernate cria as tabelas a partir das entidades (create-drop = cria no inicio, apaga no fim)
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway DESLIGADO no teste (quem cria as tabelas aqui e o Hibernate, nao o Flyway)
spring.flyway.enabled=false